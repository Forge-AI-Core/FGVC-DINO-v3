    DATASET_DIR: "data/Iron-Scraps/set_with_testset/vanilla/split_dataset_50pct"

  unique_sampling_0pct:
    DATASET_NAME: "unique_sampling_0pct"
    DATASET_DIR: "data/Iron-Scraps/set_with_testset/unique_sampling/split_dataset_0pct"
  unique_sampling_25pct:
    DATASET_NAME: "unique_sampling_25pct"
